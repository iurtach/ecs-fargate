global:
  resolve_timeout: 5m
  telegram_api_url: 'https://api.telegram.org'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: telegram-default

  routes:
    - match:
        severity: critical
      receiver: telegram-critical
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: telegram-default
    - match:
        severity: info
      receiver: telegram-info
      group_wait: 5m

receivers:
  - name: telegram-default
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message: |
          🔔 *{{ .Status | toUpper }}* — {{ .CommonLabels.alertname }}
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}
        parse_mode: Markdown

  - name: telegram-critical
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message: |
          🚨 *CRITICAL* — {{ .CommonLabels.alertname }}
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}
        parse_mode: Markdown

  - name: telegram-info
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message: |
          ℹ️ *INFO* — {{ .CommonLabels.alertname }}
          {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
        parse_mode: Markdown

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']
