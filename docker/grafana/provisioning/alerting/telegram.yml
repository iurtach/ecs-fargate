apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram-receiver
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: ${TELEGRAM_CHAT_ID}
          message: |
            {{ range .Alerts }}
            *{{ .Status | toUpper }}: {{ .Labels.alertname }}*
            Severity: {{ .Labels.severity }}
            {{ .Annotations.summary }}
            {{ end }}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: Telegram
    group_by: ['alertname', 'grafana_folder']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
