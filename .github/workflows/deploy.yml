name: Build, Push & Deploy to ECS Fargate

on:
  push:
    branches: [main]

env:
  AWS_REGION:   eu-north-1
  PROJECT_NAME: ecs-fargate

jobs:
  # ───────────────────────────────────────────────────────
  # 1. Run tests (fast-fail before building images)
  # ───────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.x

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: .

      - name: Terraform Validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: .

  # ───────────────────────────────────────────────────────
  # 2. Build & push Docker images to ECR
  # ───────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    strategy:
      matrix:
        service: [ollama, web, prometheus, grafana, alertmanager]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./docker/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:${{ env.SHORT_SHA }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:${{ env.SHORT_SHA }}
          format: table
          exit-code: '0'           # warn only (set to '1' to fail on CRITICAL)
          severity: CRITICAL,HIGH

  # ───────────────────────────────────────────────────────
  # 3. Deploy updated services to ECS
  # ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment for all services
        run: |
          CLUSTER="${{ env.PROJECT_NAME }}-prod-cluster"
          for SERVICE in ollama web prometheus grafana; do
            echo "Deploying $SERVICE..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "${{ env.PROJECT_NAME }}-prod-${SERVICE}" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager
          done

      - name: Notify Telegram on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Deployment Successful*
          Project: \`${{ env.PROJECT_NAME }}\`
          Branch: \`${{ github.ref_name }}\`
          Commit: \`${{ github.sha }}\`
          Actor: ${{ github.actor }}"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚨 *Deployment FAILED*
          Project: \`${{ env.PROJECT_NAME }}\`
          Branch: \`${{ github.ref_name }}\`
          Commit: \`${{ github.sha }}\`
          Actor: ${{ github.actor }}
          Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
