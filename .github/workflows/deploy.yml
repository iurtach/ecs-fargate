name: Build, Push & Deploy to ECS Fargate

on:
  push:
    branches: [main]

env:
  AWS_REGION:   eu-north-1
  PROJECT_NAME: ecs-fargate
  CLUSTER:      ecs-fargate-prod-cluster

jobs:
  # ───────────────────────────────────────────────────────
  # 1. Run tests (fast-fail before building images)
  # ───────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.x

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: .

      - name: Terraform Validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: .

  # ───────────────────────────────────────────────────────
  # 2. Build & push Docker images to ECR
  #    Each image is tagged only with the git SHA (7 chars).
  #    No :latest — so every image is traceable to a commit.
  # ───────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write   # needed for OIDC auth

    strategy:
      matrix:
        service: [ollama, web, prometheus, grafana, alertmanager, postgres]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Push only the SHA tag — no :latest
      # provenance: false — prevents Docker Buildx from creating an extra
      # untagged 0.01 MB attestation blob alongside every image in ECR.
      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./docker/${{ matrix.service }}
          push: true
          provenance: false
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:${{ env.SHORT_SHA }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:${{ env.SHORT_SHA }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  # ───────────────────────────────────────────────────────
  # 3. Deploy updated services to ECS
  #
  #    For each service we:
  #      a) Download the current task definition from AWS
  #      b) Swap the image tag to the new SHA (render step)
  #      c) Register the updated task definition as a new revision
  #      d) Update the ECS service to use that new revision
  #
  #    This is the correct pattern: the task definition always
  #    stores the exact image SHA that is running, giving full
  #    traceability between a git commit and what is deployed.
  # ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ── Ollama ──────────────────────────────────────────
      - name: Download ollama task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-prod-ollama \
            --query taskDefinition > ollama-task-def.json

      - name: Update ollama image tag in task definition
        id: render-ollama
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ollama-task-def.json
          container-name: ollama
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/ollama:${{ env.SHORT_SHA }}

      - name: Deploy ollama service
        uses: aws-actions/amazon-ecs-deploy-task-def@v2
        with:
          task-definition: ${{ steps.render-ollama.outputs.task-definition }}
          service: ${{ env.PROJECT_NAME }}-prod-ollama
          cluster: ${{ env.CLUSTER }}

      # ── Web ─────────────────────────────────────────────
      - name: Download web task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-prod-web \
            --query taskDefinition > web-task-def.json

      - name: Update web image tag in task definition
        id: render-web
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: web-task-def.json
          container-name: web
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/web:${{ env.SHORT_SHA }}

      - name: Deploy web service
        uses: aws-actions/amazon-ecs-deploy-task-def@v2
        with:
          task-definition: ${{ steps.render-web.outputs.task-definition }}
          service: ${{ env.PROJECT_NAME }}-prod-web
          cluster: ${{ env.CLUSTER }}

      # ── Prometheus ──────────────────────────────────────
      # The prometheus task has two custom images: prometheus + alertmanager.
      # We run render twice, chaining the output of the first into the second.
      - name: Download prometheus task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-prod-prometheus \
            --query taskDefinition > prometheus-task-def.json

      - name: Update prometheus image tag in task definition
        id: render-prometheus
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: prometheus-task-def.json
          container-name: prometheus
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/prometheus:${{ env.SHORT_SHA }}

      - name: Update alertmanager image tag in task definition
        id: render-alertmanager
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-prometheus.outputs.task-definition }}
          container-name: alertmanager
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/alertmanager:${{ env.SHORT_SHA }}

      - name: Deploy prometheus service
        uses: aws-actions/amazon-ecs-deploy-task-def@v2
        with:
          task-definition: ${{ steps.render-alertmanager.outputs.task-definition }}
          service: ${{ env.PROJECT_NAME }}-prod-prometheus
          cluster: ${{ env.CLUSTER }}

      # ── Grafana ─────────────────────────────────────────
      - name: Download grafana task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.PROJECT_NAME }}-prod-grafana \
            --query taskDefinition > grafana-task-def.json

      - name: Update grafana image tag in task definition
        id: render-grafana
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: grafana-task-def.json
          container-name: grafana
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/grafana:${{ env.SHORT_SHA }}

      - name: Deploy grafana service
        uses: aws-actions/amazon-ecs-deploy-task-def@v2
        with:
          task-definition: ${{ steps.render-grafana.outputs.task-definition }}
          service: ${{ env.PROJECT_NAME }}-prod-grafana
          cluster: ${{ env.CLUSTER }}

      # ── Postgres ────────────────────────────────────────
      - name: Download postgres task definition
        run: aws ecs describe-task-definition --task-definition ${{ env.PROJECT_NAME }}-prod-postgres --query taskDefinition > postgres-task-def.json

      - name: Update postgres image tag in task definition
        id: render-postgres
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: postgres-task-def.json
          container-name: postgres
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/postgres:${{ env.SHORT_SHA }}

      - name: Deploy postgres service
        uses: aws-actions/amazon-ecs-deploy-task-def@v2
        with:
          task-definition: ${{ steps.render-postgres.outputs.task-definition }}
          service: ${{ env.PROJECT_NAME }}-prod-postgres
          cluster: ${{ env.CLUSTER }}

      # ── Notifications ───────────────────────────────────
      - name: Notify Telegram on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Deployment Successful*
          Project: \`${{ env.PROJECT_NAME }}\`
          Branch: \`${{ github.ref_name }}\`
          Commit: \`${{ github.sha }}\`
          Actor: ${{ github.actor }}"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚨 *Deployment FAILED*
          Project: \`${{ env.PROJECT_NAME }}\`
          Branch: \`${{ github.ref_name }}\`
          Commit: \`${{ github.sha }}\`
          Actor: ${{ github.actor }}
          Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
